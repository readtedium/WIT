<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /opt/wit/html

    # Enable CGI processing
    ScriptAlias /cgi-bin/ /opt/wit/bin/

    # Serve WIT icons
    Alias /wit-icons /opt/wit/icons

    # HTML directory
    <Directory /opt/wit/html>
        Require all granted
        Options -Indexes
        DirectoryIndex index.html
    </Directory>

    # Icons directory
    <Directory /opt/wit/icons>
        Require all granted
    </Directory>

    # Read-only CGI scripts (no auth required)
    <Directory /opt/wit/bin>
        Require all granted
        Options +ExecCGI
        SetHandler cgi-script
    </Directory>

    # Require auth for posting
    <Location /cgi-bin/wit-post>
        AuthType Basic
        AuthName "WIT Login"
        AuthUserFile /opt/wit/data/Discussion/Admin/htpasswd
        Require valid-user
    </Location>

    # Set WIT environment and pass authenticated user
    SetEnv WIT_ROOT /opt/wit
    <Location /cgi-bin>
        PassEnv REMOTE_USER
    </Location>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
