server {
    listen 80;
    server_name _;

    root /opt/wit/html;
    index index.html;

    # Serve icons
    location /wit-icons/ {
        alias /opt/wit/icons/;
    }

    # Main page
    location = / {
        try_files /index.html =404;
    }

    # CGI - post (requires auth)
    location ~ ^/cgi-bin/wit-post(/.*)?$ {
        auth_basic "WIT Login";
        auth_basic_user_file /opt/wit/data/Discussion/Admin/htpasswd;

        gzip off;

        fastcgi_split_path_info ^(/cgi-bin/[^/]+)(/.*)?$;

        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /opt/wit/bin/wit-post;
        fastcgi_param SCRIPT_NAME /cgi-bin/wit-post;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param REMOTE_USER $remote_user;
    }

    # All other CGI scripts (no auth)
    location ~ ^/cgi-bin/(?<cgi_script>[^/?]+) {
        gzip off;

        fastcgi_split_path_info ^(/cgi-bin/[^/]+)(/.*)?$;

        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /opt/wit/bin/$cgi_script;
        fastcgi_param SCRIPT_NAME /cgi-bin/$cgi_script;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param REMOTE_USER $remote_user;
    }
}
